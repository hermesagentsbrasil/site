<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent Brasil — Em breve</title>
<meta name="description" content="Hermes Agent Brasil — a comunidade brasileira do Hermes Agent. Em breve, conteúdo em português e meetups pelo Brasil.">
<meta property="og:title" content="Hermes Agent Brasil — Em breve">
<meta property="og:description" content="A comunidade brasileira do Hermes Agent. Em breve, conteúdo em português e meetups pelo Brasil.">
<meta property="og:type" content="website">
<meta property="og:locale" content="pt_BR">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c;
    --ink:#f4f4f6;
    --muted:#a0a0aa;
    --faint:#6a6a76;
    --border:#26262e;
    --surface:#16161b;
    --br-green:#2ea043;
    --accent:#f7d916;
    --grad:linear-gradient(160deg,#2ea043 0%,#9ad41a 28%,#f7d916 55%,#3aa0d6 80%,#1f6feb 100%);
    --grad-text:linear-gradient(180deg,#3ec85a 0%,#f7d916 50%,#1f6feb 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:32px 24px;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  .grad-text{
    background:var(--grad-text);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
  }

  /* background glow */
  .bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .bg-fx::before{
    content:"";position:absolute;top:-25%;left:50%;transform:translateX(-50%);
    width:820px;height:820px;border-radius:50%;
    background:radial-gradient(circle, rgba(46,160,67,.16), transparent 60%);
    filter:blur(40px);
  }
  .bg-fx::after{
    content:"";position:absolute;bottom:-25%;right:-10%;
    width:680px;height:680px;border-radius:50%;
    background:radial-gradient(circle, rgba(31,111,235,.14), transparent 60%);
    filter:blur(40px);
  }

  main{position:relative;z-index:1;max-width:660px;width:100%}
  .logo{max-width:560px;width:92%;margin:0 auto 38px;display:block;
    filter:drop-shadow(0 8px 44px rgba(46,160,67,.28))}

  .badge{display:inline-flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;
    font-size:12.5px;color:var(--muted);border:1px solid var(--border);background:var(--surface);
    padding:8px 16px;border-radius:999px;margin-bottom:30px}
  .badge .pulse{width:7px;height:7px;border-radius:50%;background:var(--br-green);
    box-shadow:0 0 0 0 rgba(46,160,67,.6);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,160,67,.5)}70%{box-shadow:0 0 0 9px rgba(46,160,67,0)}100%{box-shadow:0 0 0 0 rgba(46,160,67,0)}}

  h1{font-size:clamp(24px,4.4vw,38px);font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:18px}
  p.lead{font-size:clamp(16px,2.4vw,19px);color:var(--muted);max-width:48ch;margin:0 auto 36px}

  .orig{display:inline-flex;align-items:center;gap:10px;font-size:15px;font-weight:600;
    padding:13px 24px;border-radius:12px;background:var(--grad);color:#0a0a0c;
    transition:transform .15s,box-shadow .2s;box-shadow:0 4px 22px rgba(247,217,22,.22)}
  .orig:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(247,217,22,.34)}

  .foot{margin-top:54px;color:var(--faint);font-size:13px}
  .foot .scan{font-family:'JetBrains Mono',monospace}

  @media(prefers-reduced-motion:reduce){.pulse{animation:none}}
</style>
</head>
<body>
<div class="bg-fx"></div>

<main>
  <img class="logo" src="assets/img/logo-stacked.jpeg" alt="Hermes Agent Brasil">

  <div class="badge"><span class="pulse"></span> Em breve</div>

  <h1>A comunidade brasileira do <span class="grad-text">Hermes Agent</span></h1>

  <p class="lead">Estamos chegando. Em breve, conteúdo em português e meetups pelo Brasil para quem constrói com agentes autônomos.</p>

  <a class="orig" href="https://hermes-agent.nousresearch.com" target="_blank" rel="noopener">
    Conheça o Hermes Agent original →
  </a>

  <div class="foot">
    © <span id="yr"></span> Hermes Agent Brasil · <span class="scan">feito no 🇧🇷</span>
  </div>
</main>

<script>document.getElementById('yr').textContent=new Date().getFullYear();</script>
</body>
</html>
